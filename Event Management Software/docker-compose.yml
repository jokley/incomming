version: '3.8'

services:
  backend:
    build: ./backend
    container_name: freestyle-wm-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - backend-data:/app
    environment:
      - FLASK_ENV=development
    networks:
      - freestyle-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: freestyle-wm-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    environment:
      - VITE_API_URL=http://backend:5000/api
    depends_on:
      - backend
    networks:
      - freestyle-network
    restart: unless-stopped

networks:
  freestyle-network:
    driver: bridge

volumes:
  backend-data:
